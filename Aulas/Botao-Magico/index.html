<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset ="UTF-8">
        <title>O Botão Mágico</title>
        <style>
            body {
                background: #0a0a0a;
                display: flex;
                justify-content: center;
                height: 20vh;
                font-family:"Arial", Helvetica, sans-serif, #ffffff;

            }
            #botaoMagico{
                background: linear-gradient(45deg, #00ff88, #00ccff);
                color: #ffffff;
                border: none;
                padding: 30px 60px;
                font-size: 24px;
                border-radius: 50px;
                cursor: pointer;
                box-shadow: 0 0 30px rgba(0, 255, 136,0.5);
                transition: all 0.35;
            }


        </style>
    </head>
</html>
<body>



</body>
    <button id = "botaoMagico">Clique em Mim!</button>

    <script>
        const botao = document.getElementById('botaoMagico');
        const cores = [
        ' linear-gradient(45deg, #ff006e, #8338ec)',
        ' linear-gradient(45deg, #ffbe0b, #fb5607)',
        ' linear-gradient(45deg, #00ff88, #00ccff)',
        ' linear-gradient(45deg, #7209b7, #f72585)',
        ];
        const mensagem = ['Uau', 'Incrível', 'Fantástico', 'Clique de Novo!'];
        let contador = 0;

        botao.addEventListener('click', function(){
            contador = (contador + 1) %cores.length; 
            botao.style.background = cores[contador];
            botao.textContent = mensagem [contador];
        }
     );
    
    </script>
    </button>
    </html>
